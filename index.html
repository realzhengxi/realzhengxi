<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZhengXi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F1F7F4;
      color: #2c2c2c;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 48px;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 480px;
      width: 100%;
    }

    /* Name */
    .name {
      font-size: clamp(52px, 9vw, 80px);
      font-weight: 500;
      letter-spacing: -3px;
      line-height: 1;
      margin-bottom: 12px;
      color: #2c2c2c;
    }

    .name .dot {
      color: #b74e4e;
    }

    /* Tagline */
    .tagline {
      font-size: 14px;
      color: #888;
      font-weight: 300;
      margin-bottom: 48px;
      line-height: 1.7;
    }

    .word {
      color: #2c2c2c;
      font-weight: 600;
      background: rgba(183, 78, 78, 0.12);
      padding: 2px 6px;
      border-radius: 3px;
      margin: 0 2px;
    }

    /* Divider */
    .divider {
      width: 32px;
      height: 1px;
      background: #e2efe6;
      margin-bottom: 32px;
    }

    /* Bio */
    .bio {
      font-size: 13px;
      color: #888;
      font-weight: 300;
      margin-bottom: 40px;
      line-height: 1.8;
    }

    .bio strong {
      color: #2c2c2c;
      font-weight: 400;
    }

    /* Links */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 0;
      border-bottom: 1px solid #e2efe6;
      text-decoration: none;
      color: #2c2c2c;
      font-size: 13px;
      font-weight: 400;
      transition: color 0.2s ease;
    }

    .link:first-child {
      border-top: 1px solid #e2efe6;
    }

    .link:hover {
      color: #b74e4e;
    }

    .link-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .link-label {
      font-size: 12px;
      color: #bbb;
      font-weight: 300;
      min-width: 40px;
    }

    .link-text {
      font-size: 13px;
    }

    .link-arrow {
      font-size: 12px;
      color: #bbb;
      transition: transform 0.2s ease, color 0.2s ease;
    }

    .link:hover .link-arrow {
      transform: translateX(4px);
      color: #b74e4e;
    }
  </style>
</head>
<body>

  <div class="page">
    <h1 class="name">Zheng<span class="dot">.</span>Xi</h1>
    <p class="tagline">
      Agricultural Researcher · Edible Fungi & Mushroom Studies<br>
      <span class="word">Running</span> · <span class="word">Music</span> · <span class="word">Photography</span> · <span class="word">Travel</span>
    </p>

    <div class="divider"></div>

    <p class="bio">
      Agricultural researcher focusing on <strong>edible fungi and mushroom-related studies</strong>.<br>
      Based in <span class="word">Ganzi, China</span>.
    </p>

    <div class="links">
      <a href="https://blog.realzhengxi.com" target="_blank" class="link">
        <div class="link-left">
          <span class="link-label">01</span>
          <span class="link-text">Blog</span>
        </div>
        <span class="link-arrow">→</span>
      </a>
      <a href="mailto:xi.z@outlook.com" class="link">
        <div class="link-left">
          <span class="link-label">02</span>
          <span class="link-text">Email</span>
        </div>
        <span class="link-arrow">→</span>
      </a>
    </div>
  </div>

</body>
</html>
